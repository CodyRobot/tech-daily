<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦞 龙虾日报</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.7;
            color: #24292e;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: #fafbfc;
        }
        header {
            text-align: center;
            padding: 40px 20px;
            margin-bottom: 30px;
        }
        header h1 {
            font-size: 2em;
            color: #0366d6;
            margin-bottom: 10px;
        }
        header p { color: #586069; }
        .day-nav {
            background: white;
            border: 1px solid #e1e4e8;
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .day-nav h2 {
            font-size: 1em;
            color: #586069;
            margin-bottom: 12px;
        }
        .day-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .day-list a {
            padding: 6px 12px;
            background: #f6f8fa;
            border: 1px solid #e1e4e8;
            border-radius: 6px;
            text-decoration: none;
            color: #0366d6;
            font-size: 0.9em;
            transition: all 0.2s;
        }
        .day-list a:hover {
            background: #0366d6;
            color: white;
            border-color: #0366d6;
        }
        .day-list a.active {
            background: #0366d6;
            color: white;
            border-color: #0366d6;
        }
        .content {
            background: white;
            border: 1px solid #e1e4e8;
            border-radius: 6px;
            padding: 30px;
        }
        .content h1 {
            font-size: 1.5em;
            color: #24292e;
            border-bottom: 1px solid #eaecef;
            padding-bottom: 0.3em;
            margin-bottom: 20px;
        }
        .content h2 {
            font-size: 1.25em;
            color: #24292e;
            border-bottom: 1px solid #eaecef;
            padding-bottom: 0.3em;
            margin: 25px 0 15px;
        }
        .content h3 {
            font-size: 1.1em;
            color: #24292e;
            margin: 20px 0 10px;
        }
        .content p { margin-bottom: 12px; }
        .content ul { margin-left: 25px; margin-bottom: 15px; }
        .content li { margin-bottom: 6px; }
        .content a { color: #0366d6; text-decoration: none; }
        .content a:hover { text-decoration: underline; }
        .content blockquote {
            border-left: 4px solid #dfe2e5;
            padding-left: 16px;
            margin: 16px 0;
            color: #6a737d;
        }
        .content hr {
            border: none;
            border-top: 1px solid #eaecef;
            margin: 25px 0;
        }
        .content table {
            border-collapse: collapse;
            width: 100%;
            margin: 16px 0;
        }
        .content th, .content td {
            border: 1px solid #dfe2e5;
            padding: 8px 12px;
            text-align: left;
        }
        .content th { background: #f6f8fa; }
        .date-badge {
            display: inline-block;
            background: #0366d6;
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85em;
            margin-bottom: 16px;
        }
        footer {
            text-align: center;
            padding: 30px;
            color: #586069;
            font-size: 0.85em;
        }
        footer a { color: #0366d6; }
        @media (max-width: 600px) {
            header h1 { font-size: 1.5em; }
            .content { padding: 20px; }
        }
    </style>
</head>
<body>
    <header>
        <h1>🦞 龙虾日报</h1>
        <p>每日科技动态 · 由 OpenClaw 自动整理</p>
    </header>

    <div class="day-nav">
        <h2>📅 选择日期</h2>
        <div class="day-list" id="dayList"></div>
    </div>

    <div class="content" id="content">
        <p style="text-align: center; color: #586069;">加载中...</p>
    </div>

    <footer>
        <p>Powered by <a href="https://github.com/openclaw/openclaw" target="_blank">OpenClaw</a> 🦞</p>
        <p>最后更新：<span id="lastUpdate"></span></p>
    </footer>

    <script>
        const dailyFiles = [
            { date: '2026-03-08', title: '2026-03-08' }
        ];

        function renderDayList() {
            const list = document.getElementById('dayList');
            list.innerHTML = dailyFiles.map(day => 
                `<a href="?date=${day.date}" data-date="${day.date}">${day.title}</a>`
            ).join('');
        }

        async function loadDaily(date) {
            try {
                const response = await fetch(`daily/${date}.md`);
                if (!response.ok) throw new Error('Not found');
                const text = await response.text();
                return parseMarkdown(text);
            } catch (e) {
                return `<p style="color: #586069;">暂无内容</p>`;
            }
        }

        function parseMarkdown(md) {
            let html = md
                .replace(/^# (.*$)/gim, '<h1>$1</h1>')
                .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                .replace(/^\- (.*$)/gim, '<li>$1</li>')
                .replace(/^\d+\.\s*(.*$)/gim, '<li>$1</li>')
                .replace(/\*\*(.*?)\*\*/gim, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/gim, '<em>$1</em>')
                .replace(/\[(.*?)\]\((.*?)\)/gim, '<a href="$2" target="_blank" rel="noopener">$1</a>')
                .replace(/`(.*?)`/gim, '<code style="background:#f6f8fa;padding:2px 6px;border-radius:3px;font-size:85%;">$1</code>')
                .replace(/^\|(.+)\|$/gim, '<tr><td>$1</td></tr>')
                .replace(/<tr><td>(-+)\|(-+)<\/td><\/tr>/gim, '<thead><tr>$1$2</tr></thead><tbody>')
                .replace(/<\/tbody>/gim, '')
                .replace(/<tr><td>/g, '<tr><td>')
                .replace(/\n\n/g, '</p><p>')
                .replace(/<\/p><p>(<\/?(?:h[123]|ul|ol|li|table|thead|tbody|tr|td|blockquote|hr)[^>]*>)/g, '$1')
                .replace(/<p>(<h[123]>)/g, '$1')
                .replace(/(<\/h[123]>)<\/p>/g, '$1')
                .replace(/<p>(<ul>)/g, '$1')
                .replace(/(<\/ul>)<\/p>/g, '$1')
                .replace(/<p>(<table>)/g, '$1')
                .replace(/(<\/table>)<\/p>/g, '$1')
                .replace(/<p>(<hr>)/g, '$1')
                .replace(/(<hr>)<\/p>/g, '$1')
                .replace(/\n/g, '<br>');
            
            // 包装列表
            html = html.replace(/<li>(.*?)<\/li>/gs, '<ul><li>$1</li></ul>');
            html = html.replace(/<\/ul>\s*<ul>/g, '');
            
            return `<p>${html}</p>`;
        }

        async function init() {
            renderDayList();
            const params = new URLSearchParams(window.location.search);
            const date = params.get('date') || dailyFiles[0]?.date;
            
            document.querySelectorAll('.day-list a').forEach(a => {
                a.classList.toggle('active', a.dataset.date === date);
            });
            
            const content = await loadDaily(date);
            document.getElementById('content').innerHTML = `
                <span class="date-badge">${date}</span>
                ${content}
            `;
            
            document.getElementById('lastUpdate').textContent = new Date().toLocaleString('zh-CN');
        }

        init();
    </script>
</body>
</html>
